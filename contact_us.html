<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>

    <link href="css/main.css" rel="stylesheet">
    <link href="css/fonts.css" rel="stylesheet">
    <link href="css/contact_us.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">

</head>

<body>

    <!-- header / nav -->
    <header>
        <nav class="header_bar">
            <a class="header_logo" href="index.html">
                <h1>Savr</h1>
            </a>

            <div class="header_nav_bar">
                <a class="header_nav_bar_item other_font" href="index.html">Home</a>
                <a class="header_nav_bar_item other_font" href="menu.html">Menu</a>
                <a class="header_nav_bar_item other_font" href="summer_special.html">Summer Special</a>
                <a class="header_nav_bar_item other_font" href="cart.html">Cart</a>
                <a class="header_nav_bar_item other_font" href="contact_us.html">Contact Us</a>


            </div>
        </nav>
    </header>

    <main>

        <!-- hero image -->

        <div class="home_section">
            <div class="home_img">
                <img src="img/contact_us_img.png" alt="Savr catering service">
            </div>

            <div class="home_text contact_us_text">
                <h2>We'd love to hear from you!</h2>
            </div>
        </div>



        <!-- contact info -->
        <div class="contact_info_detail">
            <div class="contact_info">

                <!-- contact info card // maybe 2x2 grid -->
                <div class="contact_info_card">
                    <!-- contact icon -->
                    <div class="contact_info_img">
                        <img src="img/phone_icon_green.png" alt="phone icon">
                    </div>

                    <!-- contact info text -->
                    <div class="contact_info_text">
                        <h4>Call Us</h4>
                        <p>+1 (604) 765-4321</p>
                    </div>
                </div>

                <div class="contact_info_card email_card">
                    <div class="contact_info_img">
                        <img src="img/email_icon_green.png" alt="email icon">
                    </div>

                    <div class="contact_info_text">
                        <h4>Email Us</h4>
                        <p>info@savrcatering.ca</p>
                    </div>
                </div>

                <div class="contact_info_card">
                    <div class="contact_info_img">
                        <img src="img/ig_icon_green.png" alt="ig icon">
                    </div>

                    <div class="contact_info_text">
                        <h4>Instagram</h4>
                        <p>savrcatering</p>
                    </div>
                </div>

                <div class="contact_info_card">
                    <div class="contact_info_img">
                        <img src="img/location_icon_green.png" alt="location icon">
                    </div>

                    <div class="contact_info_text">
                        <h4>Find Us</h4>
                        <p>1288 Granville Street<br>
                            Vancouver, BC V6Z 1M4
                        </p>
                    </div>
                </div>

            </div>

            <div class="text_input_field_grid other_font">
                <div class="text_input_field_column_1">
                    <h3>Write Us A Message</h3>

                    <div class="form_group">
                        <label for="full_name">Full Name</label>
                        <input id="full_name" type="text" placeholder="Full Name">
                    </div>

                    <div class="form_group">
                        <label for="email">Email Address</label>
                        <input id="email" type="email" placeholder="youremail@placeholder.com">
                    </div>

                    <div class="form_group">
                        <label for="phone">Phone Number</label>
                        <input id="phone" type="tel" placeholder="+1 (604) 123-4567">
                    </div>

                    <div class="form_group">
                        <label for="message">Message</label>                        
                        <!-- source: https://developer.mozilla.org/en-US/docs/Web/HTML/Reference/Elements/textarea -->
                        <textarea name="message" id="message" rows="4" cols="50"></textarea>
                    </div>

                    <div class="button_group other_font">
                        <a href="#" class="primary_button">Submit</a>
                    </div>


                </div>

            </div>

        </div>

    </main>

    <!-- footer -->
    <footer>
        <div class="footer_grid">
            <div class="footer_column_1">
                <h1>Savr</h1>

                <h4><a class="in_text_link" href="contact_us.html">Contact Us</a></h4>
                <h4><a class="in_text_link" href="style_guide/style_guide.html">Style Guide</a></h4>
                <h4><a class="in_text_link" href="citations.html">Citations</a></h4>

            </div>
        </div>
    </footer>


</body>

</html>

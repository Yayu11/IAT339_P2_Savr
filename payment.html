<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment</title>

    <link href="css/main.css" rel="stylesheet">
    <link href="css/fonts.css" rel="stylesheet">
    <link href="css/layout.css" rel="stylesheet">

</head>

<body>

    <!-- header / nav -->
    <header>
        <nav class="header_bar">
            <a class="header_logo" href="index.html">
                <h1>Savr</h1>
            </a>

            <div class="header_nav_bar">
                <a class="header_nav_bar_item other_font" href="index.html">Home</a>
                <a class="header_nav_bar_item other_font" href="menu.html">Menu</a>
                <a class="header_nav_bar_item other_font" href="summer_special.html">Summer Special</a>
                <a class="header_nav_bar_item other_font" href="cart.html">Cart</a>
                <a class="header_nav_bar_item other_font" href="contact_us.html">Contact Us</a>


            </div>
        </nav>
    </header>

    <main>

        <h2>Checkout</h2>

        <!-- Overall layout of the page -->
        <div class="text_input_field_grid other_font">
            <!-- the left side of the page -->
            <div class="text_input_field_column_1">

                <h4>Enter your name and address:</h4>

                <div class="form_group">
                    <label for="full_name">Full Name</label>
                    <input id="full_name" type="text" placeholder="Full Name">
                </div>

                <div class="payment_merge">
                    <div class="form_group">
                        <label for="address">Street Address</label>
                        <input id="address" type="text" placeholder="1234 St.">
                    </div>

                    <div class="form_group">
                        <label for="apt">Apt</label>
                        <input id="apt" type="text" placeholder="XXX">
                    </div>
                </div>

                <div class="payment_merge">
                    <div class="form_group">
                        <label for="city">City</label>
                        <input id="city" type="text" placeholder="City">
                    </div>

                    <div class="form_group">
                        <label for="postal">Postal Code</label>
                        <input id="postal" type="text" placeholder="XXX XXX">
                    </div>
                </div>

                <h4>What's your contact information?</h4>

                <div class="form_group">
                    <label for="email">Email Address</label>
                    <input id="email" type="email" placeholder="youremail@placeholder.com">
                </div>

                <div class="form_group">
                    <label for="phone">Phone Number</label>
                    <input id="phone" type="tel" placeholder="+1 (604) 123-4567">
                </div>

            </div>

            <!-- the right side of the page -->
            <div class="text_input_field_column_2">

                <h4>Enter your card information:</h4>

                <div class="form_group">
                    <label for="cardnumber">Card Number</label>
                    <input id="cardnumber" type="text" placeholder="XXXX XXXX XXXX XXXX">
                </div>

                <div class="payment_merge">

                    <div class="form_group">
                        <label for="expiration">Expiration</label>
                        <input id="expiration" type="text" placeholder="MM/YY">
                    </div>

                    <div class="form_group">
                        <label for="cvv">CVV</label>
                        <input id="cvv" type="text" placeholder="XXX">
                    </div>

                </div>

                <div class="button_group other_font">
                    <a href="after_payment.html" class="primary_button">Confirm Payment</a>
                    <a href="cart.html" class="secondary_button">Back to Cart</a>
                </div>

            </div>

        </div>
    </main>

    <!-- footer -->
    <footer>
        <div class="footer_grid">
            <div class="footer_column_1">
                <h1>Savr</h1>

                <h4><a class="in_text_link" href="contact_us.html">Contact Us</a></h4>
                <h4><a class="in_text_link" href="style_guide/style_guide.html">Style Guide</a></h4>
                <h4><a class="in_text_link" href="citations.html">Citations</a></h4>

            </div>
        </div>
    </footer>


</body>

</html>
